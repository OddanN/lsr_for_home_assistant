name: Trigger ha_page deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pages.yml in OddanN/ha_page
        env:
          GH_TOKEN: ${{ secrets.HA_PAGE_WORKFLOW_TOKEN }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/OddanN/ha_page/actions/workflows/pages.yml/dispatches \
            -d '{"ref":"main"}'
